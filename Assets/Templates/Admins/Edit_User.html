{% extends 'Admins/AdminHome.html' %}
{% block contents %}
<style>
    .edit-container {
        padding: 40px;
        background: rgba(10, 25, 47, 0.7);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        border: 1px solid rgba(100, 255, 218, 0.2);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .edit-container h2 {
        color: #64ffda;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    .form-group label {
        color: #64ffda;
        font-weight: 600;
        margin-bottom: 8px;
    }
    .form-control {
        background: rgba(10, 25, 47, 0.5) !important;
        border: 1px solid rgba(100, 255, 218, 0.3) !important;
        color: #fff !important;
        border-radius: 10px;
        padding: 12px;
        transition: all 0.3s;
    }
    .form-control:focus {
        border-color: #64ffda !important;
        box-shadow: 0 0 15px rgba(100, 255, 218, 0.2);
        transform: translateY(-2px);
    }
</style>

<div class="edit-container">
    <h2><i class="fas fa-user-edit"></i> Edit Neuro-User</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control" value="{{user.Name}}" required>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" name="mobile" class="form-control" value="{{user.Mobile}}" required>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" name="email" class="form-control" value="{{user.Email}}" required>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" value="{{user.Username}}" required>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="form-group">
                    <label>Password</label>
                    <input type="text" name="password" class="form-control" value="{{user.Password}}" required>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="form-group">
                    <label>Physical Address</label>
                    <input type="text" name="address" class="form-control" value="{{user.Address}}" required>
                </div>
            </div>
        </div>
        <div class="text-center mt-4">
            <button type="submit" class="btn-cyber btn-cyan">
                <i class="fas fa-save"></i> Update Intelligence
            </button>
            <a href="{% url 'AdminHome' %}" class="btn-cyber btn-orange">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
