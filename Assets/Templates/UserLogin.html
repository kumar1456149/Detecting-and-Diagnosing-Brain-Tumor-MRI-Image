{% extends 'Base.html'%}
{% load static %}
{% block side_image %}{% static 'Images/cyber_auth.png' %}{% endblock %}
{% block image_class %}img-user{% endblock %}
{% block contents%}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
  integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<style>
  body {
    background-image: url("{% static 'Images/user_dashboard_bg.png' %}");
  }
  .input-group {
    position: relative;
    margin: 30px 0;
    width: 100%;
    max-width: 350px;
  }

  .input-group label {
    position: absolute;
    top: 50%;
    left: 15px;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--slate);
    pointer-events: none;
    transition: all 0.3s ease;
  }

  .input-group input {
    width: 100%;
    height: 50px;
    font-size: 16px;
    color: var(--medical-white);
    padding: 0 15px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    outline: none;
    transition: border-color 0.3s;
  }

  .input-group input:focus {
    border-color: var(--cyber-cyan);
    background: rgba(100, 255, 218, 0.05);
  }

  .input-group input:focus~label,
  .input-group input:valid~label {
    top: -12px;
    left: 10px;
    font-size: 12px;
    color: var(--cyber-cyan);
    background: var(--primary-blue);
    padding: 0 5px;
  }

  .btn-custom {
    background: var(--cyber-cyan);
    color: var(--primary-blue);
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(100, 255, 218, 0.2);
    margin: 10px 5px;
  }

  .btn-custom:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(100, 255, 218, 0.4);
    opacity: 0.9;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--medical-white);
  }
  
  .reset-btn:hover {
    border-color: #ff4d4d;
    color: #ff4d4d;
    box-shadow: 0 0 15px rgba(255, 77, 77, 0.2);
  }

  .login-container {
    max-width: 450px;
    margin: 40px auto;
    padding: 40px;
    background: rgba(10, 25, 47, 0.8);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    animation: slideIn 0.8s ease-out;
  }
</style>
<div class="login-container">
  <div class="custom_heading-container mb-4">
    <h2>User Login</h2>
  </div>

  <form action="" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="input-group">
      <input type="text" required autocomplete="off" name="name">
      <label for="Name">UserName</label>
    </div>

    <div class="input-group">
      <input type="password" name="password" required autocomplete="off">
      <label for="password">Password</label>
    </div>
    {% for message in messages%}
    <div class="alert alert-danger" role="alert" style="background: rgba(255, 77, 77, 0.1); border: 1px solid #ff4d4d; color: #ff4d4d;">
      {{message}}
    </div>
    {% endfor %}

    <div class="text-center mt-4">
      <button type="submit" class="btn-cyber btn-cyan">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
      <button type="reset" class="btn-cyber btn-cyber-reset">
        <i class="fas fa-undo"></i> Reset
      </button>
    </div>
  </form>
</div>
{% endblock %}
